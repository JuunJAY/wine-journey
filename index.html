<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍷 나의 와인 여정</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    background:#0a0505;
    color:#f5e6d3;
    font-family:Georgia,'Times New Roman',serif;
    min-height:100vh;
    overflow-x:hidden;
}

/* ── Header ── */
#header {
    text-align:center;
    padding:28px 20px 14px;
    background:linear-gradient(180deg,#1a0808 0%,transparent 100%);
    border-bottom:1px solid #2a1010;
}
#header h1 { font-size:1.9rem; color:#c9a84c; letter-spacing:4px; text-transform:uppercase; margin-bottom:6px; }
#header p  { font-size:0.8rem; color:#8a7060; letter-spacing:1.5px; font-style:italic; }

/* ── Stats ── */
#stats {
    display:flex; justify-content:center; gap:50px;
    padding:14px 20px; background:#120606;
    border-bottom:1px solid #2a1010;
}
.stat-item { text-align:center; }
.stat-number { font-size:1.8rem; color:#c9a84c; line-height:1; }
.stat-label  { font-size:0.65rem; color:#7a5a4a; letter-spacing:2px; text-transform:uppercase; margin-top:4px; }

/* ── Map ── */
#map-wrap {
    width:100%; overflow-x:auto;
    background:#0a0505; padding:24px 10px;
}
#wine-map {
    display:block; margin:0 auto;
    width:100%; max-width:1500px; height:auto;
}

/* Continent */
.land { fill:#1a1008; stroke:#2e1c0a; stroke-width:1.2; }

/* Grid lines (subtle) */
.gridline { stroke:#1a1008; stroke-width:0.5; fill:none; }

/* Region */
.region { cursor:pointer; }
.region circle {
    transition:r 0.25s ease, filter 0.25s ease;
    r:8;
}
.region.untried circle {
    fill:#2a1818; stroke:#5a3030; stroke-width:1.5;
}
.region.tried circle {
    fill:#8B0000; stroke:#d4183a; stroke-width:2;
    filter:drop-shadow(0 0 5px rgba(212,24,58,0.55));
}
.region:hover circle { r:12; }
.region.tried:hover circle {
    filter:drop-shadow(0 0 14px rgba(212,24,58,0.9));
}

.region-dot-label {
    font-size:7px; fill:#7a5a4a; text-anchor:middle;
    pointer-events:none; font-family:Georgia,serif;
    transition:fill 0.2s;
}
.region.tried .region-dot-label { fill:#e8d8c0; }
.region:hover .region-dot-label  { fill:#f5e6d3; }

.wine-count {
    font-size:7px; fill:#f5e6d3; text-anchor:middle;
    dominant-baseline:central; pointer-events:none;
    font-family:Georgia,serif; font-weight:bold;
}

.country-lbl {
    font-size:10px; fill:#3a2818; text-anchor:middle;
    letter-spacing:2.5px; text-transform:uppercase;
    font-family:Georgia,serif; pointer-events:none;
}

/* ── Legend ── */
#legend {
    display:flex; justify-content:center; align-items:center;
    gap:24px; padding:12px 20px;
    font-size:0.75rem; color:#6a5040;
    border-top:1px solid #1a0a0a;
}
.leg { display:flex; align-items:center; gap:8px; }
.leg-dot { width:11px; height:11px; border-radius:50%; }
.leg-dot.tried   { background:#8B0000; box-shadow:0 0 6px rgba(212,24,58,0.6); }
.leg-dot.untried { background:#2a1818; border:1px solid #5a3030; }

/* ── Popup ── */
#overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.65); z-index:998;
}
#overlay.on { display:block; }

#panel {
    position:fixed; top:0; right:-460px; width:440px; height:100vh;
    background:#0f0606; border-left:1px solid #2a1010;
    transition:right 0.38s cubic-bezier(0.25,0.46,0.45,0.94);
    overflow-y:auto; z-index:999;
    box-shadow:-12px 0 50px rgba(0,0,0,0.85);
}
#panel.on { right:0; }

#p-close {
    position:absolute; top:14px; right:14px;
    background:none; border:1px solid #4a2020;
    color:#c8b8a8; width:30px; height:30px;
    cursor:pointer; font-size:14px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; border-radius:2px;
}
#p-close:hover { background:#2a1010; border-color:#c41e3a; color:#f5e6d3; }

#p-name    { padding:44px 24px 8px; font-size:1.45rem; color:#c9a84c; letter-spacing:1px; }
#p-country { padding:0 24px 16px; font-size:0.72rem; color:#7a5a4a; letter-spacing:2px; text-transform:uppercase; border-bottom:1px solid #1e1010; }

.psec { padding:16px 24px; border-bottom:1px solid #180a0a; }
.psec-title { font-size:0.65rem; color:#c9a84c; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.psec-body  { font-size:0.82rem; color:#c0a898; line-height:1.65; }
.psec-body em { color:#f0e0d0; font-style:normal; }

/* Wine cards */
.wcard {
    background:#180a0a; border:1px solid #2a1414;
    border-radius:3px; padding:13px; margin-bottom:10px;
    transition:border-color 0.2s;
}
.wcard:hover { border-color:#8B0000; }
.wcard-name  { font-size:0.88rem; color:#f0e0d0; margin-bottom:3px; }
.wcard-meta  { font-size:0.68rem; color:#6a4a3a; margin-bottom:9px; }
.wcard-lbl   { font-size:0.62rem; color:#c9a84c; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:3px; }
.wcard-note  { font-size:0.78rem; color:#a89070; line-height:1.55; font-style:italic; }
.wcard-mynote{ font-size:0.8rem; color:#c0b0a0; line-height:1.55; }
.wcard-stars { margin-top:7px; color:#c9a84c; font-size:0.82rem; }
.no-wines    { text-align:center; padding:28px 10px; color:#4a3a30; font-style:italic; font-size:0.82rem; }

/* Scrollbar */
::-webkit-scrollbar       { width:5px; }
::-webkit-scrollbar-track { background:#0a0505; }
::-webkit-scrollbar-thumb { background:#2a1010; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#8B0000; }
</style>
</head>

// ── 투영 ─────────────────────────────────────────────────────
function proj(lat, lon) {
    return { x:(lon+180)*(1500/360), y:(90-lat)*(750/180) };
}

// ── 상태 ─────────────────────────────────────────────────────
let DATA = { wines:[] };

// ── 렌더 ─────────────────────────────────────────────────────
function renderMap() {
    const layer = document.getElementById('rg');
    layer.innerHTML = '';

    Object.entries(R).forEach(([id, reg]) => {
        const p = proj(reg.lat, reg.lon);
        const ws = DATA.wines.filter(w => w.region === id);
        const tried = ws.length > 0;

        const g = document.createElementNS('http://www.w3.org/2000/svg','g');
        g.setAttribute('class', `region ${tried?'tried':'untried'}`);
        g.setAttribute('data-id', id);
        g.setAttribute('transform', `translate(${p.x.toFixed(1)},${p.y.toFixed(1)})`);

        const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
        c.setAttribute('cx','0'); c.setAttribute('cy','0'); c.setAttribute('r', tried?'8':'7');
        g.appendChild(c);

        if (ws.length > 1) {
            const cnt = document.createElementNS('http://www.w3.org/2000/svg','text');
            cnt.setAttribute('class','wine-count');
            cnt.setAttribute('x','0'); cnt.setAttribute('y','0');
            cnt.textContent = ws.length;
            g.appendChild(cnt);
        }

        const lbl = document.createElementNS('http://www.w3.org/2000/svg','text');
        lbl.setAttribute('class','region-dot-label');
        lbl.setAttribute('x','0'); lbl.setAttribute('y', tried?'22':'19');
        lbl.textContent = reg.n;
        g.appendChild(lbl);

        g.addEventListener('click', () => openPanel(id));
        layer.appendChild(g);
    });
}

function updateStats() {
    const regions   = new Set(DATA.wines.map(w => w.region));
    const countries = new Set(DATA.wines.map(w => R[w.region]?.c).filter(Boolean));
    document.getElementById('sn-regions').textContent   = regions.size;
    document.getElementById('sn-wines').textContent     = DATA.wines.length;
    document.getElementById('sn-countries').textContent = countries.size;
}

// ── 패널 ─────────────────────────────────────────────────────
function openPanel(id) {
    const reg = R[id];
    document.getElementById('p-name').textContent    = reg.n;
    document.getElementById('p-country').textContent = reg.c;
    document.getElementById('p-grapes').innerHTML    = `<em>${reg.g}</em>`;
    document.getElementById('p-tasting').textContent = reg.t;

    const ws = DATA.wines.filter(w => w.region === id);
    const div = document.getElementById('p-wines');
    if (!ws.length) {
        div.innerHTML = '<div class="no-wines">아직 기록한 와인이 없어요 🍷<br>텔레그램으로 알려주세요!</div>';
    } else {
        div.innerHTML = ws.map(w => `
            <div class="wcard">
                <div class="wcard-name">${w.name}</div>
                <div class="wcard-meta">${w.date_tried||''}${w.grape?' · '+w.grape:''}</div>
                ${w.expert_notes?`<div class="wcard-lbl">전문가 테이스팅</div><div class="wcard-note">${w.expert_notes}</div>`:''}
                ${w.my_notes?`<div class="wcard-lbl" style="margin-top:9px;color:#a89070;">내 기록</div><div class="wcard-mynote">${w.my_notes}</div>`:''}
                ${w.rating?`<div class="wcard-stars">${'★'.repeat(Math.floor(w.rating))}${'☆'.repeat(5-Math.floor(w.rating))} ${w.rating}</div>`:''}
            </div>`).join('');
    }

    document.getElementById('panel').classList.add('on');
    document.getElementById('overlay').classList.add('on');
}

function closePanel() {
    document.getElementById('panel').classList.remove('on');
    document.getElementById('overlay').classList.remove('on');
}

// ── 이벤트 ───────────────────────────────────────────────────
document.getElementById('p-close').addEventListener('click', closePanel);
document.getElementById('overlay').addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });

// ── 초기화 ───────────────────────────────────────────────────
async function init() {
    try {
        const r = await fetch('./wines.json?v=' + Date.now());
        if (r.ok) DATA = await r.json();
    } catch(e) { /* 첫 로드 시 빈 데이터 */ }
    renderMap();
    updateStats();
}

init();
</script>
</body>
</html>
